{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto space-y-6">

    {% if messages %}
        <div class="space-y-2">
            {% for message in messages %}
                <div class="p-3 rounded-md text-sm font-medium {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200{% else %}bg-emerald-100 text-emerald-700 border border-emerald-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Envoyer un document</h2>
        <p class="text-sm text-gray-500 mb-6">PDF, PNG ou JPEG — 10 Mo maximum. Le document est transmis à l'API pour extraction.</p>

        <form method="POST" action="{% url 'upload_document' %}" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="file" class="block text-sm font-medium text-gray-700 mb-1">Fichier</label>
                <input type="file" id="file" name="file" required accept=".pdf,.png,.jpg,.jpeg,application/pdf,image/png,image/jpeg"
                       class="block w-full text-sm text-gray-700 border border-gray-300 rounded-md cursor-pointer focus:outline-none file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-emerald-600 file:text-white file:font-semibold hover:file:bg-emerald-700">
            </div>
            <div class="pt-2">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-md transition-colors">
                    Envoyer le document
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
