{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto space-y-6">

    {% if messages %}
        <div class="space-y-2">
            {% for message in messages %}
                <div class="p-3 rounded-md text-sm font-medium {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200{% else %}bg-emerald-100 text-emerald-700 border border-emerald-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Envoyer un document</h2>
        <p class="text-sm text-gray-500 mb-6">PDF, PNG ou JPEG — {{ taille_max_mo }} Mo maximum. Le document est transmis à l'API pour extraction.</p>

        <form id="upload-form" method="POST" action="{% url 'upload_document' %}" enctype="multipart/form-data" class="space-y-4"
              data-max-size="{{ taille_max_octets }}" data-extensions="{{ extensions_autorisees }}">
            {% csrf_token %}

            <!-- Zone de dépôt : cliquable et compatible glisser-déposer. -->
            <label id="dropzone" for="file"
                   class="flex flex-col items-center justify-center gap-2 w-full py-10 px-4 text-center border-2 border-dashed border-gray-300 rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.9 5 5 0 019.9-1A4.5 4.5 0 1116 16m-4-4v8m0-8l-3 3m3-3l3 3" />
                </svg>
                <span id="dropzone-text" class="text-sm text-gray-600 font-medium">Glissez un fichier ici ou cliquez pour parcourir</span>
                <span class="text-xs text-gray-400">PDF, PNG ou JPEG — {{ taille_max_mo }} Mo max</span>
            </label>

            <input type="file" id="file" name="file" required
                   accept="{{ extensions_autorisees }},application/pdf,image/png,image/jpeg"
                   class="sr-only">

            <p id="client-error" class="hidden text-sm font-medium text-red-600"></p>

            <div class="pt-2">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-md transition-colors">
                    Envoyer le document
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Validation côté client : confort seulement. La validation serveur (vue
// Django) reste la seule qui fait autorité.
(function () {
    const form = document.getElementById("upload-form");
    const input = document.getElementById("file");
    const dropzone = document.getElementById("dropzone");
    const dropzoneText = document.getElementById("dropzone-text");
    const erreur = document.getElementById("client-error");

    const tailleMax = parseInt(form.dataset.maxSize, 10);
    const extensions = form.dataset.extensions.split(",").filter(Boolean);

    function afficherErreur(message) {
        erreur.textContent = message;
        erreur.classList.remove("hidden");
    }

    function masquerErreur() {
        erreur.textContent = "";
        erreur.classList.add("hidden");
    }

    function extensionValide(nom) {
        const point = nom.lastIndexOf(".");
        if (point === -1) return false;
        return extensions.includes(nom.slice(point).toLowerCase());
    }

    // Renvoie un message d'erreur, ou null si le fichier est valide.
    function valider(fichier) {
        if (!extensionValide(fichier.name)) {
            return "Format non supporté (PDF, PNG ou JPEG attendu).";
        }
        if (fichier.size > tailleMax) {
            return "Fichier trop volumineux.";
        }
        return null;
    }

    function traiterSelection() {
        masquerErreur();
        const fichier = input.files && input.files[0];
        if (!fichier) {
            dropzoneText.textContent = "Glissez un fichier ici ou cliquez pour parcourir";
            return;
        }
        const message = valider(fichier);
        if (message) {
            afficherErreur(message);
            input.value = "";
            dropzoneText.textContent = "Glissez un fichier ici ou cliquez pour parcourir";
            return;
        }
        dropzoneText.textContent = fichier.name;
    }

    input.addEventListener("change", traiterSelection);

    // Glisser-déposer : on affecte le fichier déposé à l'input.
    ["dragenter", "dragover"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) {
            e.preventDefault();
            dropzone.classList.add("border-emerald-500", "bg-emerald-50");
        });
    });
    ["dragleave", "drop"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) {
            e.preventDefault();
            dropzone.classList.remove("border-emerald-500", "bg-emerald-50");
        });
    });
    dropzone.addEventListener("drop", function (e) {
        if (e.dataTransfer && e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            traiterSelection();
        }
    });

    // Dernier filet côté client avant envoi.
    form.addEventListener("submit", function (e) {
        const fichier = input.files && input.files[0];
        if (!fichier) {
            e.preventDefault();
            afficherErreur("Veuillez sélectionner un fichier.");
            return;
        }
        const message = valider(fichier);
        if (message) {
            e.preventDefault();
            afficherErreur(message);
        }
    });
})();
</script>
{% endblock content %}
