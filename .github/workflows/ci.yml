name: Python CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  security-and-types:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Type Checking (Mypy)
        run: uv run mypy .

      - name: Security Scan (Bandit)
        run: uv run bandit -r . -ll -x ./.venv,./.django_tailwind_cli

  tests:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        env:
          DJANGO_ENV: test
        run: uv run pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
